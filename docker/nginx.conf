upstream futboss_nextjs {
    server nextjs:3000;
    keepalive 64;
}

upstream futboss_websocket {
    server nextjs:3001;
    keepalive 64;
}

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=futboss_cache:10m max_size=1g inactive=60m use_temp_path=off;

limit_req_zone $binary_remote_addr zone=futboss_limit:10m rate=30r/s;

server {
    listen 80;
    server_name futboss.com www.futboss.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name futboss.com www.futboss.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    client_max_body_size 10m;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    keepalive_timeout 65;

    location / {
        limit_req zone=futboss_limit burst=50 nodelay;

        proxy_cache futboss_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass http://futboss_nextjs;
    }

    location /_next/static {
        proxy_cache futboss_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_key "$host$request_uri";
        add_header Cache-Control "public, immutable, max-age=31536000";
        expires 365d;
        access_log off;
        proxy_pass http://futboss_nextjs;
    }

    location /images {
        proxy_cache futboss_cache;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400";
        expires 24h;
        access_log off;
        proxy_pass http://futboss_nextjs;
    }

    location /api {
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        proxy_pass http://futboss_nextjs;
    }

    location /ws {
        proxy_pass http://futboss_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 86400s;
    }

    location /health {
        access_log off;
        proxy_pass http://futboss_nextjs;
    }

    location /favicon.ico {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /robots.txt {
        access_log off;
        proxy_pass http://futboss_nextjs;
    }

    location /sitemap.xml {
        access_log off;
        proxy_cache futboss_cache;
        proxy_cache_valid 200 24h;
        proxy_pass http://futboss_nextjs;
    }

    error_page 500 502 503 504 /error.html;
    location = /error.html {
        internal;
    }
}
